[variables]
NIXPACKS_NODE_VERSION = "22"
# Railway sets NODE_ENV=production during install; still need devDeps for next build.
NIXPACKS_INSTALL_DEV_DEPS = "true"

[phases.build]
cmds = ["npm run build", "node scripts/bootstrap-db.mjs || echo '[nixpacks] build-time DB bootstrap skipped or failed — will retry at start'"]
