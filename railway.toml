# Railway — ciright.agents.keyra.ie (ciright-agents-keyra)
# Requires Postgres: DATABASE_URL=${{Postgres.DATABASE_URL}}
# Repo must be this project root (package.json at /), branch main.

[build]
builder = "nixpacks"

[deploy]
# `npm start` runs scripts/start-with-db.mjs which:
#   1. prisma db push --accept-data-loss (idempotent)
#   2. tsx prisma/seed.ts (idempotent upserts)
#   3. next start
# Both steps are non-fatal so the app always boots and /api/health responds.
startCommand = "npm start"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
