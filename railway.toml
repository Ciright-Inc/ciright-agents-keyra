# Railway — ciright.agents.keyra.ie (ciright-agents-keyra)
# Requires Postgres: DATABASE_URL=${{Postgres.DATABASE_URL}}
# Repo must be this project root (package.json at /), branch main.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Schema + seed run at start (build has no DB access; avoids P1012 on SQLite vs Postgres URL).
startCommand = "/bin/sh -c \"npm run deploy:db && exec npm run start\""
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
